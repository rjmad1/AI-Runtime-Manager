# OpenClaw Workstation Installer Settings
# This file is user-editable.

litellm:
  host: "127.0.0.1"
  port: 4000
  # API key is auto-generated on first configure - DO NOT set default value
  api_key: ""
  set_verbose: false
  drop_params: true
  routing_strategy: "latency-based-routing"
  num_retries: 3
  request_timeout: 30

openclaw:
  host: "127.0.0.1"
  port: 18789
  # The installation path/directory for OpenClaw's configuration.
  # Leave blank to auto-discover user's home folder ~/.openclaw
  config_dir: ""

ollama:
  enabled: true
  api_base: "http://127.0.0.1:11434"
  # Set to true to automatically launch Ollama if it is installed but not running
  autostart: true

lifecycle:
  log_level: "INFO"
  # Folder where backup archives will be stored
  backup_dir: "backups"
  # Perform port/process cleanup automatically on startup
  auto_cleanup_ports: true
