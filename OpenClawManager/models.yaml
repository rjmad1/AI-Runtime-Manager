# Models Routing & Registry Configuration
# This maps client-side model names to LiteLLM backends, contexts, and fallbacks.

models:
  - id: "gemini-2.5-flash"
    name: "Gemini 2.5 Flash"
    provider: "gemini"
    litellm_model: "gemini/gemini-2.5-flash"
    context_window: 1048576
    max_tokens: 8192
    fallbacks: ["llama-3.3-70b-sambanova", "llama-3.3-70b-groq"]

  - id: "llama-3.3-70b-groq"
    name: "Llama 3.3 70B (Groq)"
